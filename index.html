<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loader</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">

<h1 class="text-2xl mb-4">UPLOAD SCRIPT</h1>

<textarea id="code" class="w-full h-40 bg-gray-900 p-2"></textarea>

<button onclick="up()" class="bg-green-600 px-4 py-2 mt-2">UPLOAD</button>

<pre id="out" class="mt-4 text-green-400"></pre>

<script>
async function up(){
  let c=document.getElementById('code').value
  let r=await fetch('/upload',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content:c})
  })
  let d=await r.json()
  document.getElementById('out').innerText=d.loader
}
</script>

</body>
</html>
